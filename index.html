<!DOCTYPE html>
<html>

<head>

<title>Invoice Generator</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="toolbar">

<label>Select Business</label>

<select id="businessSelect" onchange="loadBusiness()">

<option value="skilled">The Skilled Network</option>

<option value="prints">The Prints Headquarters</option>

</select>

<button onclick="window.print()">Print / Save PDF</button>

</div>



<div class="invoice">

<h1 class="title">INVOICE</h1>



<div class="header">

<div class="company">

<h2 id="bizName"></h2>

<p id="bizAddress"></p>

<p>Telephone: <span id="bizPhone"></span></p>

<p>TIN: <span id="bizTax"></span></p>

</div>



<div class="invoiceDetails">

<label>Invoice Number</label>
<input id="invoiceNumber" readonly>

<label>Invoice Date</label>
<input type="date" id="date">

<label>Due Date</label>
<input type="date" id="dueDate">

</div>

</div>



<div class="billto">

<h3>BILL TO</h3>

<input id="clientName" placeholder="Client name">

</div>



<table id="items">

<thead>

<tr>

<th>Description</th>

<th>Qty</th>

<th>Price (NGN)</th>

<th>Amount</th>

</tr>

</thead>

<tbody id="itemRows"></tbody>

</table>



<button onclick="addRow()">+ Add Item</button>



<div class="totals">

<h2>Total: NGN <span id="total">0</span></h2>

</div>



<button class="saveBtn" onclick="saveInvoice()">Save Invoice</button>



<div class="payment">

<h3>Bank Details</h3>

<p id="bank1"></p>

</div>



</div>



<script src="js/app.js"></script>

</body>
</html>
